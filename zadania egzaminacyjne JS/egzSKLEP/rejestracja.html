<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Sklep - rejestracja</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>
    <aside>
        <img src="obraz.png" alt="promocje">
        <h2>Sprawdź promocje</h2>
        <table>
            <tr>
                <th>co?</th><th>ile taniej?</th>
            </tr>
            <tr>
                <td>ubrania</td><td>15%</td>
            </tr>
            <tr>
                <td>buty</td>
                <td>25%</td>
            </tr>
        </table>
    </aside>
    <header>
        <h1>Zarejestruj się w sklepie</h1>
    </header>
    <main>
        <button id="one">Klient</button>
        <button id="two">Adres</button>
        <button id="three">Kontakt</button>
            <section class="one">
                <p>Imię</p>
                <input type="text" placeholder="Wpisz dane..." id="imie">
                <p>Nazwisko</p>
                <input type="text" id="nazwisko">
                <p>Data urodzenia</p>
                <input type="date" id="dataUr">
            </section>
            <section class="two">
                <p>Ulica</p>
                <input type="text" id="ulica">
                <p>Numer</p>
                <input type="number" id="nrUl">
                <p>Miasto</p>
                <input type="text" id="miasto">
            </section>
            <section class="three">
                <p>Numer komórkowy</p>
                <input type="tel" id="nrTel"><br>
                <input type="checkbox" id="rodo"><label>Akceptuję RODO</label><br>
                <button id="zatwierdz">Zatwiedź dane</button><!--funkcja zatw-->
            </section>
    </main>
    <section id="postep">
        <section id="blok"></section>
    </section>
    <footer>
        <h4>Rejestrację do sklepu wykonał: iishkaa</h4>
    </footer>
    <script src="main.js"></script>
</body>
</html>
