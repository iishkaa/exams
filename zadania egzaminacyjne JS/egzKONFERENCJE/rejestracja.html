<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>
<header>
    <h1>Formularz rejestracyjny konferencji <em>Nasze Kwiaty</em></h1>
</header>
<main>
    <div class="one">
        <h2>Dane osobowe</h2>
        <input type="text" placeholder="Wpisz imię..." id="imie" required ><br>
        <input type="text" placeholder="Wpisz nazwisko..." id="nazwisko" required><br>
        <button id="button1">Następna karta</button> <!--skrypt-->
    </div>
    <div class="two">
        <h2>Dane kontaktowe</h2>
        <input type="email" placeholder="Twój e-mail..." id="email"><br>
        <input type="tel" placeholder="Twój numer telefonu..." id="tel"><br>
        <button id="button2">Następna karta</button>
    </div>
    <div class="three">
        <h2>Hasło do logowania</h2>
        <input type="password" placeholder="Podaj hasło" id="password"><br>
        <input type="password" placeholder="Powtórz hasło" id="passwordRepeat"><br>
        <button id="button3">Zatwierdź</button>
    </div>
</main>
<footer>
    <video controls>
        <source src="motyl.mp4" type="video/mp4">
        Przeglądarka nie obsługuje tego formatu
    </video>
</footer>
<footer>
    <h3>Plan konferencji</h3>
    <table>
        <tr>
            <td>9:00 - 12:00</td>
            <td>Pielęgnacja roślin</td>
        </tr>
        <tr>
            <td>13:00 - 15:00</td>
            <td>Targi kwiatowe</td>
        </tr>
    </table>
</footer>
<footer>
    <p>
        <a href="https://kwiaty.pl/">Internetowa kwiaciarnia</a>
    </p>
</footer>
<footer>
    <p>Formularz wykonał: iishkaa</p>
</footer>
<script src="main.js"></script>
</body>
</html>
